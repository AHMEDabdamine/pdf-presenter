<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Remote Control · PDF Presenter</title>
    <link rel="stylesheet" href="/css/style.css" />
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <script src="/socket.io/socket.io.js"></script>
  </head>
  <body class="remote-page">
    <!-- Connection screen -->
    <div class="remote-connect" id="remoteConnect">
      <div class="rc-logo"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l8.66 5v10L12 22l-8.66-5V7L12 2z"/></svg></div>
      <h1>Remote Control</h1>
      <p>Enter your session ID to connect</p>
      <div class="rc-input-row">
        <input
          type="text"
          id="sessionInput"
          placeholder="e.g. A1B2C3D4"
          maxlength="8"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn btn-primary" id="connectBtn">Connect</button>
      </div>
      <p class="rc-hint" id="rcHint"></p>
    </div>

    <!-- Remote control pad (shown after connected) -->
    <div class="remote-pad" id="remotePad" style="display: none">
      <div class="rc-header">
        <span class="rc-session-name" id="rcSessionName" style="font-weight: 600; color: var(--accent); margin-right: 8px; display: none;">Untitled Session</span>
        <span class="rc-session-badge" id="rcSessionBadge">—</span>
        <div style="display: flex; align-items: center; gap: 8px">
          <span class="rc-status connected" id="rcStatusDot">Live</span>
          <button
            class="btn-icon rc-fullscreen-btn"
            id="rcHeaderFullscreen"
            title="Fullscreen"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
          </button>
          <button
            class="btn-icon rc-cursor-btn"
            id="rcCursorToggle"
            title="Toggle Cursor"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><circle cx="12" cy="12" r="1"/></svg>
          </button>
        </div>
        <div style="display: flex; gap: 6px; align-items: center">
          <button class="btn-icon" id="rcFullscreen" title="Fullscreen">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
          </button>
          <button class="btn-icon" id="rcDisconnect" title="Disconnect">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>

      <!-- Unified Control and Notes Panel -->
      <div class="rc-tab-panel" id="tabControl">
        <!-- Slide counter display -->
        <div class="rc-slide-preview">
          <div class="rc-slide-box" id="rcSlideBox">
            <span id="rcSlideNum">—</span>
            <span class="rc-slide-divider">/</span>
            <span id="rcTotalSlides">—</span>
          </div>
          <p class="rc-slide-label">Current Slide</p>
        </div>

        <!-- Main navigation buttons -->
        <div class="rc-nav">
          <button class="rc-btn rc-btn-prev" id="rcPrev">
            <span class="rc-arrow">&#8249;</span>
            <span>Prev</span>
          </button>
          <button class="rc-btn rc-btn-next" id="rcNext">
            <span class="rc-arrow">&#8250;</span>
            <span>Next</span>
          </button>
        </div>

        <!-- Slide jump input -->
        <div class="rc-jump">
          <label>Jump to slide</label>
          <div class="rc-jump-row">
            <input type="number" id="jumpInput" min="1" placeholder="1" />
            <button class="btn btn-sm" id="jumpBtn">Go</button>
          </div>
        </div>

        <!-- Notes Section -->
        <div class="rc-notes-section">
          <div class="rc-notes-toolbar">
            <span class="notes-label">Speaker Notes</span>
            <div class="notes-controls">
              <button
                class="btn-icon notes-font-btn"
                id="notesFontDown"
                title="Smaller text"
              >
                A−
              </button>
              <button
                class="btn-icon notes-font-btn"
                id="notesFontUp"
                title="Larger text"
              >
                A+
              </button>
              <button class="btn btn-sm" id="notesTeleBtn">
                ▶ Teleprompter
              </button>
            </div>
          </div>
          <textarea
            id="notesArea"
            class="rc-notes-area"
            placeholder="Type or paste your speaker notes here…&#10;&#10;They stay on your phone while the audience sees the slides."
          ></textarea>
        </div>

        <!-- Swipe hint -->
        <p class="rc-swipe-hint">← Swipe left/right to change slides →</p>
      </div>

      <!-- Teleprompter overlay (fullscreen scrolling text) -->
      <div
        class="teleprompter-overlay"
        id="teleprompterOverlay"
        style="display: none"
      >
        <div class="tp-toolbar">
          <button class="btn-icon" id="tpClose"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
          <span class="tp-title">Teleprompter</span>
          <div class="tp-speed-row">
            <label>Speed</label>
            <input
              type="range"
              id="tpSpeed"
              min="0"
              max="8"
              step="0.1"
              value="1.5"
            />
            <span class="tp-speed-value" id="tpSpeedValue">1.5</span>
          </div>
          <button class="btn btn-sm" id="tpPlayPause">⏸ Pause</button>
        </div>
        <div class="tp-text-wrap" id="tpTextWrap">
          <div class="tp-text" id="tpText"></div>
        </div>
        <!-- Slide controls for fullscreen mode -->
        <div class="tp-slide-controls" id="tpSlideControls">
          <button class="tp-slide-btn" id="tpPrevSlide">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            Prev
          </button>
          <span class="tp-slide-indicator" id="tpSlideIndicator">1 / 1</span>
          <button class="tp-slide-btn" id="tpNextSlide">
            Next
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Fullscreen overlay for control pad -->
    <div class="rc-fs-overlay" id="rcFsOverlay" style="display: none">
      <div class="rfs-counter" id="rfsCounter">— / —</div>
      <div class="rfs-nav">
        <button class="rfs-btn" id="rfsPrev">&#8249;</button>
        <button class="rfs-btn rfs-next" id="rfsNext">&#8250;</button>
      </div>
      <button class="rfs-exit" id="rfsExit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;"><path d="M18 6L6 18M6 6l12 12"/></svg> Exit</button>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/js/remote.js"></script>
  </body>
</html>
