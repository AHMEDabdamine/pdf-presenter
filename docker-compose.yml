services:
  pdf-presenter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-presenter
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Optional: Set custom session TTL (in hours)
      # - SESSION_TTL=4
    volumes:
      # Persist uploads between container restarts
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Optional: Use nginx as a reverse proxy for production
  # nginx:
